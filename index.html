<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrbitDev - Sua carreira em órbita</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(20, 20, 40, 0.7);
      --texto: #e0e0ff;
      --roxo: #6e44ff;
      --ciano: #44d1ff;
    }
    
    [data-tema="claro"] {
      --bg: #f0f2ff;
      --card: rgba(255, 255, 255, 0.8);
      --texto: #1a1a3a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--texto);
      transition: 0.3s;
      min-height: 100vh;
      background-image: 
        radial-gradient(1px 1px at 25px 5px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 25px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 125px 20px, #fff, rgba(0,0,0,0));
      background-size: 200px 200px;
      animation: estrelas 100s linear infinite;
    }
    
    [data-tema="claro"] body { background-image: none; }
    @keyframes estrelas { from { background-position: 0 0; } to { background-position: -400px -400px; } }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0 20px; position: relative; }
    h1 { font-size: 3.5rem; background: linear-gradient(90deg, var(--roxo), #b892ff, var(--ciano)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
    .subtitulo { color: #a0a0ff; font-size: 1.3rem; margin: 10px 0 30px; }
    
    .tema-btn {
      position: absolute; top: 20px; right: 20px;
      background: var(--card); border: 1px solid var(--roxo);
      color: var(--texto); padding: 10px 15px; border-radius: 50px;
      cursor: pointer; font-size: 1.2rem;
    }
    
    .busca {
      width: 100%; max-width: 500px; margin: 0 auto 30px;
      display: block; padding: 15px 20px; border-radius: 50px;
      border: 2px solid var(--roxo); background: var(--card);
      color: var(--texto); font-size: 1.1rem; backdrop-filter: blur(10px);
    }
    
    .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
    .contador { color: #b892ff; }
    
    .filtros { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-filtro {
      background: rgba(110, 68, 255, 0.2); border: 1px solid var(--roxo);
      color: #b892ff; padding: 8px 16px; border-radius: 25px;
      cursor: pointer; transition: 0.3s; font-size: 0.9rem;
    }
    .btn-filtro.ativo, .btn-filtro:hover { background: var(--roxo); color: #fff; }
    
    .vaga-card {
      background: var(--card); border: 1px solid rgba(100, 100, 255, 0.3);
      border-radius: 16px; padding: 25px; margin: 20px 0;
      backdrop-filter: blur(15px); transition: all 0.3s ease;
    }
    .vaga-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(110, 68, 255, 0.3); }
    
    .vaga-titulo { font-size: 1.5rem; color: var(--texto); margin-bottom: 8px; }
    .vaga-empresa { color: #b892ff; margin-bottom: 12px; }
    .vaga-desc { color: var(--texto); opacity: 0.8; line-height: 1.6; margin: 15px 0; }
    .vaga-tags { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
    .tag { background: rgba(110, 68, 255, 0.3); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--roxo); }
    
    .vaga-botoes { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
    .btn-salvar { background: transparent; border: 2px solid #ff4d8d; color: #ff4d8d; }
    .btn-salvar.salvo { background: #ff4d8d; color: #fff; }
    .btn-aplicar { background: linear-gradient(90deg, var(--roxo), var(--ciano)); color: #fff; }
    .btn-detalhes { background: transparent; border: 1px solid var(--roxo); color: var(--roxo); }
    .btn:hover { transform: scale(1.05); }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); }
    .modal-conteudo { background: var(--card); max-width: 600px; margin: 10% auto; padding: 30px; border-radius: 16px; border: 1px solid var(--roxo); position: relative; }
    .fechar { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--roxo); }
    
    footer { text-align: center; margin-top: 60px; padding: 30px; color: #6666aa; }
    .escondido { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button class="tema-btn" onclick="trocarTema()">🌙</button>
      <h1>🚀 OrbitDev</h1>
      <p class="subtitulo">Decolando sua primeira vaga tech</p>
      <input type="text" class="busca" id="busca" placeholder="Buscar por React, Node, Estágio..." onkeyup="buscarVagas()">
    </header>

    <div class="info-bar">
      <span class="contador" id="contador">5 missões disponíveis</span>
      <div class="filtros">
        <button class="btn-filtro ativo" onclick="filtrarVagas('todas')">Todas</button>
        <button class="btn-filtro" onclick="filtrarVagas('remoto')">Remoto</button>
        <button class="btn-filtro" onclick="filtrarVagas('estagio')">Estágio</button>
        <button class="btn-filtro" onclick="filtrarVagas('junior')">Júnior</button>
        <button class="btn-filtro" onclick="limparFiltros()">Limpar</button>
      </div>
    </div>

    <main id="lista-vagas"></main>

    <footer><p>OrbitDev © 2026 - Levando devs juniors pra órbita 🌌</p></footer>
  </div>

  <!-- MODAL DETALHES -->
  <div id="modal" class="modal" onclick="fecharModal()">
    <div class="modal-conteudo" onclick="event.stopPropagation()">
      <span class="fechar" onclick="fecharModal()">&times;</span>
      <div id="modal-info"></div>
    </div>
  </div>

  <script>
    const vagas = [
      {id: 'v1', titulo: 'Dev Front-end Júnior', empresa: 'CodeNebula Tech', tags: ['Remoto', 'React', 'Júnior', 'CLT'], tipo: 'remoto junior', desc: 'Ajude a construir interfaces que vão pra lua! React, TypeScript e styled-components. Plano de carreira espacial.', descCompleta: 'Você vai trabalhar no nosso produto principal que tem 50k usuários. Stack: React 18, TypeScript, Next.js, Tailwind. Benefícios: VR R$1.200, Plano saúde, Auxílio home office. CLT R$3.500-4.500.'},
      {id: 'v2', titulo: 'Estágio Back-end', empresa: 'RocketCode', tags: ['Híbrido SP', 'Node.js', 'Estágio'], tipo: 'estagio hibrido', desc: 'Primeira missão no back-end. A gente te ensina API, banco e microsserviços do zero.', descCompleta: 'Estágio 6h/dia, bolsa R$1.800 + VT + VR. Você vai aprender Node.js, Express, MongoDB e AWS. Mentoria 1:1 com devs sênior. Chance real de efetivação.'},
      {id: 'v3', titulo: 'Full Stack Júnior', empresa: 'StarCode Labs', tags: ['Remoto', 'Vue.js', 'Python', 'Júnior'], tipo: 'remoto junior', desc: 'Procuramos astronauta full stack pra nossa constelação. Vue no front, Python no back.', descCompleta: 'Produto SaaS B2B. Vue 3 + Python FastAPI + PostgreSQL. 100% remoto, horário flexível. Salário R$4.000 + bônus por entrega.'},
      {id: 'v4', titulo: 'Dev Mobile Júnior', empresa: 'OrbitApps', tags: ['Remoto', 'React Native', 'Júnior'], tipo: 'remoto junior', desc: 'Crie apps que os usuários amam. React Native + Firebase pra lançar na Play Store.', descCompleta: 'Apps com 100k+ downloads. Você vai mexer com React Native, Expo, Firebase, push notifications. PJ R$5.000.'},
      {id: 'v5', titulo: 'Estágio QA', empresa: 'GalaxyTest', tags: ['Presencial RJ', 'Estágio', 'QA'], tipo: 'estagio presencial', desc: 'Seja o guardião da qualidade da nossa galáxia. Aprenda testes automatizados.', descCompleta: 'Estágio em testes manuais e automatizados com Cypress e Jest. Bolsa R$1.600 + benefícios. Escritório na Barra da Tijuca.'}
